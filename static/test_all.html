<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Test Lab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #1e2130;
      --border:   #2a2d3a;
      --accent:   #6366f1;
      --accent2:  #8b5cf6;
      --text:     #e8e8e8;
      --muted:    #888;
      --error:    #f87171;
      --success:  #34d399;
      --warn:     #fbbf24;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ──────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 15px;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header p  { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .server-indicator {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555;
      transition: background .3s;
    }
    .dot.ok      { background: var(--success); }
    .dot.error   { background: var(--error); }

    /* ── Tab nav ──────────────────────────────────────── */
    nav {
      display: flex;
      gap: 2px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      flex-shrink: 0;
    }
    nav button {
      background: none; border: none; color: var(--muted);
      font-size: 13px; padding: 11px 16px;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .15s; white-space: nowrap;
    }
    nav button.active { color: var(--text); border-color: var(--accent); }
    nav button:hover:not(.active) { color: var(--text); }

    /* ── Layout ───────────────────────────────────────── */
    .workspace {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* panels */
    .panel {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }
    .panel.active { display: flex; }

    /* ── Shared form styles ───────────────────────────── */
    .form-area {
      padding: 20px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }
    .form-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .field label { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
    .field input, .field select, .field textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 8px 11px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 80px; }
    .field.grow { flex: 1; min-width: 160px; }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5254cc; }
    .btn-primary:disabled { background: #444; color: #777; cursor: not-allowed; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-danger { background: transparent; color: var(--error); border: 1px solid #7f1d1d; }
    .btn-danger:hover { background: #7f1d1d22; }

    /* ── Result / output area ─────────────────────────── */
    .output-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .result-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--surface2);
      font-size: 12px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: .04em;
    }
    .badge-ok      { background: #064e3b; color: var(--success); }
    .badge-error   { background: #7f1d1d; color: var(--error); }
    .badge-warn    { background: #451a03; color: var(--warn); }
    .badge-info    { background: #1e1b4b; color: #a5b4fc; }

    .result-body { padding: 14px; }

    .json-block {
      background: #0a0c14;
      border: 1px solid #1e2130;
      border-radius: 7px;
      padding: 12px;
      font-family: "Fira Code", "Cascadia Code", "Consolas", monospace;
      font-size: 12px;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: #a5b4fc;
    }

    /* ── Chat panel specific ──────────────────────────── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message { display: flex; gap: 10px; max-width: 760px; }
    .message.user      { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .msg-av {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }
    .user .msg-av      { background: #374151; }
    .assistant .msg-av { background: linear-gradient(135deg, var(--accent), var(--accent2)); }

    .bubble {
      padding: 9px 13px; border-radius: 14px;
      font-size: 14px; line-height: 1.55;
      max-width: 580px; word-break: break-word;
    }
    .user .bubble      { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .assistant .bubble { background: var(--surface); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
    .assistant.error .bubble { background: #2a1a1a; border-color: #7f1d1d; color: var(--error); }

    .cursor {
      display: inline-block; width: 2px; height: 1em;
      background: var(--accent); margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink .6s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .msg-meta { font-size: 11px; color: #555; margin-top: 3px; padding-left: 38px; }

    .chat-input-row {
      display: flex; gap: 10px; padding: 14px 24px;
      background: var(--surface); border-top: 1px solid var(--border);
      flex-shrink: 0; align-items: flex-end;
    }
    #chat-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 160px;
      overflow-y: auto;
    }
    #chat-input:focus { border-color: var(--accent); }

    /* ── Knowledge list ───────────────────────────────── */
    .chunk-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .chunk-info { flex: 1; min-width: 0; }
    .chunk-meta { font-size: 11px; color: var(--muted); margin-bottom: 5px; display: flex; gap: 8px; flex-wrap: wrap; }
    .chunk-text { font-size: 13px; line-height: 1.5; color: #ccc; }
    .chunk-id   { font-size: 10px; color: #444; margin-top: 4px; font-family: monospace; }
    .pill {
      background: #1e1b4b; color: #a5b4fc;
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 20px;
    }
    .pill.cat { background: #064e3b; color: var(--success); }

    /* ── Status bar ───────────────────────────────────── */
    #statusbar {
      padding: 4px 24px;
      font-size: 11px; color: #555;
      background: var(--bg);
      border-top: 1px solid #111318;
      min-height: 22px; flex-shrink: 0;
    }
    #statusbar.ok    { color: var(--success); }
    #statusbar.error { color: var(--error); }
    #statusbar.busy  { color: var(--accent); }

    /* ── Empty state ──────────────────────────────────── */
    .empty {
      text-align: center; color: #444;
      padding: 40px 0; font-size: 13px;
    }
  </style>
</head>
<body>

<!-- ─────────────────────────────────── HEADER ─── -->
<header>
  <div class="logo">AI</div>
  <div>
    <h1>API Test Lab</h1>
    <p>Chat · Knowledge · Summarize · Suggest · System</p>
  </div>
  <div class="server-indicator">
    <div class="dot" id="health-dot"></div>
    <span id="health-label">checking…</span>
  </div>
</header>

<!-- ─────────────────────────────────── TAB NAV ─── -->
<nav>
  <button class="active" data-tab="chat">💬 Chat</button>
  <button data-tab="knowledge-add">➕ Add Knowledge</button>
  <button data-tab="knowledge-list">📋 List Knowledge</button>
  <button data-tab="summarize">📝 Summarize</button>
  <button data-tab="suggest">💡 Suggest</button>
  <button data-tab="system">⚙️ System</button>
</nav>

<!-- ─────────────────────────────────── WORKSPACE ─── -->
<div class="workspace">

  <!-- ───── CHAT PANEL ───── -->
  <div class="panel active" id="tab-chat">
    <div class="form-area">
      <div class="form-row">
        <div class="field">
          <label>Context</label>
          <select id="chat-ctx">
            <option value="auto" selected>auto-detect</option>
            <option value="profile">profile</option>
            <option value="projects">projects</option>
            <option value="portfolio">portfolio</option>
            <option value="general">general</option>
          </select>
        </div>
        <div class="field">
          <label>User ID</label>
          <input id="chat-uid" type="text" placeholder="optional" style="width:140px" />
        </div>
        <div class="field">
          <label>Session ID</label>
          <input id="chat-sid" type="text" placeholder="leave blank = no history" style="width:180px" value="test-session-1" />
        </div>
        <div class="field">
          <label>Mode</label>
          <select id="chat-mode">
            <option value="stream" selected>Stream (SSE)</option>
            <option value="standard">Standard (JSON)</option>
          </select>
        </div>
        <div class="field" style="align-self:flex-end">
          <button class="btn btn-secondary" onclick="clearChat()">Clear</button>
        </div>
      </div>
    </div>
    <div id="chat-messages">
      <div class="empty">Ask anything — responses stream in real time.</div>
    </div>
    <div class="chat-input-row">
      <textarea id="chat-input" placeholder="Type a message…" rows="1"
        onkeydown="chatKeyDown(event)"></textarea>
      <button class="btn btn-primary" id="chat-send" onclick="sendChat()">Send</button>
    </div>
  </div>

  <!-- ───── ADD KNOWLEDGE PANEL ───── -->
  <div class="panel" id="tab-knowledge-add">
    <div class="form-area">
      <div class="form-row">
        <div class="field grow">
          <label>User ID <span style="color:#555">(leave blank → global)</span></label>
          <input id="kadd-uid" type="text" placeholder="e.g. user-42" />
        </div>
        <div class="field">
          <label>Context <span style="color:#555">(leave blank → auto)</span></label>
          <select id="kadd-ctx">
            <option value="" selected>auto-detect</option>
            <option value="profile">profile</option>
            <option value="projects">projects</option>
            <option value="portfolio">portfolio</option>
            <option value="general">general</option>
          </select>
        </div>
        <div class="field" style="align-self:flex-end">
          <button class="btn btn-primary" id="kadd-btn" onclick="addKnowledge()">Add Knowledge</button>
        </div>
      </div>
      <div class="field">
        <label>Text to store</label>
        <textarea id="kadd-text" placeholder="Paste any free-form text. It will be chunked and categorised automatically." style="min-height:120px"></textarea>
      </div>
    </div>
    <div class="output-area" id="kadd-output">
      <div class="empty">Results will appear here.</div>
    </div>
  </div>

  <!-- ───── LIST KNOWLEDGE PANEL ───── -->
  <div class="panel" id="tab-knowledge-list">
    <div class="form-area">
      <div class="form-row">
        <div class="field grow">
          <label>User ID</label>
          <input id="klist-uid" type="text" placeholder="e.g. user-42" />
        </div>
        <div class="field">
          <label>Filter by context <span style="color:#555">(optional)</span></label>
          <select id="klist-ctx">
            <option value="" selected>all contexts</option>
            <option value="profile">profile</option>
            <option value="projects">projects</option>
            <option value="portfolio">portfolio</option>
            <option value="general">general</option>
          </select>
        </div>
        <div class="field" style="align-self:flex-end">
          <button class="btn btn-primary" onclick="listKnowledge()">Fetch</button>
        </div>
      </div>
    </div>
    <div class="output-area" id="klist-output">
      <div class="empty">Enter a User ID and click Fetch.</div>
    </div>
  </div>

  <!-- ───── SUMMARIZE PANEL ───── -->
  <div class="panel" id="tab-summarize">
    <div class="form-area">
      <div class="form-row">
        <div class="field">
          <label>Context</label>
          <select id="sum-ctx">
            <option value="general" selected>general</option>
            <option value="profile">profile</option>
            <option value="projects">projects</option>
            <option value="portfolio">portfolio</option>
          </select>
        </div>
        <div class="field" style="align-self:flex-end">
          <button class="btn btn-primary" id="sum-btn" onclick="doSummarize()">Summarize</button>
        </div>
      </div>
      <div class="field">
        <label>Text / query to summarise</label>
        <textarea id="sum-text" placeholder="Paste a longer passage, or just ask a question like 'Summarise Patrick's experience'…" style="min-height:100px"></textarea>
      </div>
    </div>
    <div class="output-area" id="sum-output">
      <div class="empty">Results will appear here.</div>
    </div>
  </div>

  <!-- ───── SUGGEST PANEL ───── -->
  <div class="panel" id="tab-suggest">
    <div class="form-area">
      <div class="form-row">
        <div class="field">
          <label>Context</label>
          <select id="sug-ctx">
            <option value="general" selected>general</option>
            <option value="profile">profile</option>
            <option value="projects">projects</option>
            <option value="portfolio">portfolio</option>
          </select>
        </div>
        <div class="field" style="align-self:flex-end">
          <button class="btn btn-primary" id="sug-btn" onclick="doSuggest()">Get Suggestions</button>
        </div>
      </div>
      <div class="field">
        <label>Query</label>
        <textarea id="sug-text" placeholder="e.g. 'What technologies should I learn next?' or 'Suggest improvements to the backend architecture'" style="min-height:80px"></textarea>
      </div>
    </div>
    <div class="output-area" id="sug-output">
      <div class="empty">Results will appear here.</div>
    </div>
  </div>

  <!-- ───── SYSTEM PANEL ───── -->
  <div class="panel" id="tab-system">
    <div class="form-area">
      <div class="form-row">
        <button class="btn btn-primary" onclick="checkHealth()">Check Health</button>
        <button class="btn btn-secondary" onclick="getInfo()">Get Info</button>
        <button class="btn btn-secondary" onclick="getContexts()">List Contexts</button>
        <button class="btn btn-secondary" onclick="getFeatures()">List Features</button>
        <button class="btn btn-secondary" onclick="clearSystemOutput()">Clear</button>
      </div>
    </div>
    <div class="output-area" id="sys-output">
      <div class="empty">Click a button above to query system endpoints.</div>
    </div>
  </div>

</div><!-- /workspace -->

<div id="statusbar">Ready.</div>

<script>
/* ══════════════════════════════════════════════════════════════════
   Config
══════════════════════════════════════════════════════════════════ */
const BASE = '';  // same origin; change to 'http://localhost:8000' if needed

/* ══════════════════════════════════════════════════════════════════
   Tab switching
══════════════════════════════════════════════════════════════════ */
document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

/* ══════════════════════════════════════════════════════════════════
   Status bar helpers
══════════════════════════════════════════════════════════════════ */
const $status = document.getElementById('statusbar');
function setStatus(msg, type='') {
  $status.textContent = msg;
  $status.className = type;
}

/* ══════════════════════════════════════════════════════════════════
   Health indicator (auto-checks every 15 s)
══════════════════════════════════════════════════════════════════ */
async function checkHealthIndicator() {
  try {
    const r = await fetch(`${BASE}/api/v1/health`);
    const d = await r.json();
    const ok = d.status === 'ok';
    document.getElementById('health-dot').className = 'dot ' + (ok ? 'ok' : 'error');
    document.getElementById('health-label').textContent = ok ? 'Server OK' : 'Degraded';
  } catch {
    document.getElementById('health-dot').className = 'dot error';
    document.getElementById('health-label').textContent = 'Offline';
  }
}
checkHealthIndicator();
setInterval(checkHealthIndicator, 15000);

/* ══════════════════════════════════════════════════════════════════
   Render helpers
══════════════════════════════════════════════════════════════════ */
function card(title, badgeText, badgeClass, bodyHtml) {
  return `<div class="result-card">
    <div class="result-card-header">
      <span>${title}</span>
      <span class="badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="result-body">${bodyHtml}</div>
  </div>`;
}

function jsonBlock(obj) {
  return `<div class="json-block">${syntaxHighlight(JSON.stringify(obj, null, 2))}</div>`;
}

function syntaxHighlight(str) {
  return str
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"([^"]+)":/g, '<span style="color:#93c5fd">"$1"</span>:')
    .replace(/: "(.*?)"/g, ': <span style="color:#a5f3fc">"$1"</span>')
    .replace(/: (true|false)/g, ': <span style="color:#86efac">$1</span>')
    .replace(/: (null)/g,       ': <span style="color:#f87171">$1</span>')
    .replace(/: (-?\d+\.?\d*)/g,': <span style="color:#fde68a">$1</span>');
}

function appendOutput(containerId, html) {
  const el = document.getElementById(containerId);
  const empty = el.querySelector('.empty');
  if (empty) empty.remove();
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  el.prepend(wrapper);          // newest on top
}

function clearOutput(id) {
  document.getElementById(id).innerHTML = '<div class="empty">Cleared.</div>';
}

/* ══════════════════════════════════════════════════════════════════
   CHAT
══════════════════════════════════════════════════════════════════ */
function chatKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

function clearChat() {
  document.getElementById('chat-messages').innerHTML =
    '<div class="empty">Chat cleared.</div>';
}

function appendMsg(role, text, meta) {
  const el = document.getElementById('chat-messages');
  const empty = el.querySelector('.empty');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.innerHTML = `
    <div class="msg-av">${role === 'user' ? 'U' : 'AI'}</div>
    <div>
      <div class="bubble">${escHtml(text)}</div>
      ${meta ? `<div class="msg-meta">${meta}</div>` : ''}
    </div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  return div;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;

  const btn = document.getElementById('chat-send');
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  const ctx  = document.getElementById('chat-ctx').value;
  const uid  = document.getElementById('chat-uid').value.trim() || undefined;
  const sid  = document.getElementById('chat-sid').value.trim() || undefined;
  const mode = document.getElementById('chat-mode').value;

  appendMsg('user', msg);
  setStatus('Sending…', 'busy');

  if (mode === 'stream') {
    await streamChat(msg, ctx, uid, sid);
  } else {
    await standardChat(msg, ctx, uid, sid);
  }

  btn.disabled = false;
}

async function streamChat(msg, ctx, uid, sid) {
  // Placeholder bubble
  const el = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = `<div class="msg-av">AI</div>
    <div>
      <div class="bubble"><span class="cursor"></span></div>
      <div class="msg-meta" id="stream-meta"></div>
    </div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;

  const bubble = div.querySelector('.bubble');
  const metaEl = div.querySelector('#stream-meta');

  try {
    const body = { message: msg, context: ctx };
    if (uid) body.user_id = uid;
    if (sid) body.session_id = sid;

    const resp = await fetch(`${BASE}/api/v1/ai/chat/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      bubble.textContent = err.error || 'Request failed';
      div.classList.add('error');
      setStatus('Error ' + resp.status, 'error');
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let text = '';
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(line.slice(6));
          if (d.token !== undefined) {
            text += d.token;
            bubble.innerHTML = escHtml(text) + '<span class="cursor"></span>';
            el.scrollTop = el.scrollHeight;
          }
          if (d.done) {
            bubble.innerHTML = escHtml(text);
            metaEl.textContent = `context: ${d.context}  ·  supported: ${d.supported}`;
            metaEl.id = '';
            setStatus('Done.', 'ok');
          }
          if (d.error) {
            bubble.textContent = d.error;
            div.classList.add('error');
            setStatus('Stream error', 'error');
          }
        } catch {}
      }
    }
  } catch (err) {
    bubble.textContent = 'Network error: ' + err.message;
    div.classList.add('error');
    setStatus('Network error', 'error');
  }
}

async function standardChat(msg, ctx, uid, sid) {
  try {
    const body = { message: msg, context: ctx };
    if (uid) body.user_id = uid;
    if (sid) body.session_id = sid;

    const resp = await fetch(`${BASE}/api/v1/ai/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await resp.json();

    const answer = d.data?.answer || JSON.stringify(d);
    const supported = d.data?.supported;
    const metaCtx   = d.meta?.context || '';
    const chunks     = d.meta?.chunks_used ?? '';

    const msgDiv = appendMsg('assistant', answer,
      `context: ${metaCtx}  ·  supported: ${supported}  ·  chunks: ${chunks}`);
    if (!supported) msgDiv.classList.add('error');
    setStatus('Done.', 'ok');
  } catch (err) {
    appendMsg('assistant', 'Error: ' + err.message);
    setStatus('Error', 'error');
  }
}

/* ══════════════════════════════════════════════════════════════════
   ADD KNOWLEDGE
══════════════════════════════════════════════════════════════════ */
async function addKnowledge() {
  const text = document.getElementById('kadd-text').value.trim();
  if (!text) { setStatus('Text is required.', 'error'); return; }

  const uid = document.getElementById('kadd-uid').value.trim() || undefined;
  const ctx = document.getElementById('kadd-ctx').value || undefined;

  const btn = document.getElementById('kadd-btn');
  btn.disabled = true;
  setStatus('Adding knowledge…', 'busy');

  const body = { text };
  if (uid) body.user_id = uid;
  if (ctx) body.context = ctx;

  try {
    const resp = await fetch(`${BASE}/api/v1/ai/knowledge/add`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await resp.json();

    if (!resp.ok) {
      appendOutput('kadd-output', card(
        `POST /knowledge/add — Error ${resp.status}`,
        'ERROR', 'badge-error',
        jsonBlock(d)
      ));
      setStatus('Failed: ' + resp.status, 'error');
    } else {
      // render nice chunk cards
      const chunksHtml = (d.chunks || []).map(c => `
        <div class="chunk-card">
          <div class="chunk-info">
            <div class="chunk-meta">
              <span class="pill">${escHtml(c.context)}</span>
              <span class="pill cat">${escHtml(c.category)}</span>
            </div>
            <div class="chunk-text">${escHtml(c.text)}</div>
            <div class="chunk-id">${c.id}</div>
          </div>
        </div>`).join('');
      appendOutput('kadd-output', card(
        `POST /knowledge/add — ${d.chunks_added} chunk(s) stored in [${d.contexts.join(', ')}]`,
        'OK', 'badge-ok',
        chunksHtml || jsonBlock(d)
      ));
      setStatus(`Stored ${d.chunks_added} chunk(s) in context(s): ${d.contexts.join(', ')}`, 'ok');
    }
  } catch (err) {
    appendOutput('kadd-output', card('Network Error', 'ERROR', 'badge-error',
      `<span class="json-block">${escHtml(err.message)}</span>`));
    setStatus('Network error', 'error');
  } finally {
    btn.disabled = false;
  }
}

/* ══════════════════════════════════════════════════════════════════
   LIST KNOWLEDGE
══════════════════════════════════════════════════════════════════ */
async function listKnowledge() {
  const uid = document.getElementById('klist-uid').value.trim();
  if (!uid) { setStatus('User ID is required to list knowledge.', 'error'); return; }

  const ctx = document.getElementById('klist-ctx').value;
  const url = `${BASE}/api/v1/ai/knowledge/${encodeURIComponent(uid)}` +
              (ctx ? `?context=${encodeURIComponent(ctx)}` : '');

  setStatus('Fetching…', 'busy');

  try {
    const resp = await fetch(url);
    const d = await resp.json();

    if (!resp.ok) {
      appendOutput('klist-output', card(`GET /knowledge/${uid} — Error ${resp.status}`,
        'ERROR', 'badge-error', jsonBlock(d)));
      setStatus('Failed: ' + resp.status, 'error');
      return;
    }

    if (!d.chunks?.length) {
      appendOutput('klist-output', card(
        `GET /knowledge/${uid} — 0 chunks`,
        'EMPTY', 'badge-warn',
        '<div class="empty" style="padding:20px 0">No knowledge chunks found for this user.</div>'
      ));
      setStatus('No chunks found.', '');
      return;
    }

    const chunksHtml = d.chunks.map(c => `
      <div class="chunk-card">
        <div class="chunk-info">
          <div class="chunk-meta">
            <span class="pill">${escHtml(c.context)}</span>
            <span class="pill cat">${escHtml(c.category)}</span>
          </div>
          <div class="chunk-text">${escHtml(c.text)}</div>
          <div class="chunk-id">${c.id}</div>
        </div>
        <button class="btn btn-danger" onclick="deleteChunk('${escHtml(uid)}','${c.id}',this)"
          title="Delete this chunk">✕</button>
      </div>`).join('');

    appendOutput('klist-output', card(
      `GET /knowledge/${uid} — ${d.total} chunk(s)`,
      'OK', 'badge-ok', chunksHtml
    ));
    setStatus(`${d.total} chunk(s) loaded.`, 'ok');
  } catch (err) {
    appendOutput('klist-output', card('Network Error', 'ERROR', 'badge-error',
      `<span class="json-block">${escHtml(err.message)}</span>`));
    setStatus('Network error', 'error');
  }
}

async function deleteChunk(uid, chunkId, btn) {
  if (!confirm(`Delete chunk ${chunkId}?`)) return;
  btn.disabled = true;
  setStatus('Deleting…', 'busy');
  try {
    const resp = await fetch(
      `${BASE}/api/v1/ai/knowledge/${encodeURIComponent(uid)}/${encodeURIComponent(chunkId)}`,
      { method: 'DELETE' }
    );
    const d = await resp.json();
    if (d.deleted) {
      btn.closest('.chunk-card').remove();
      setStatus('Chunk deleted.', 'ok');
    } else {
      setStatus('Chunk not found or already deleted.', 'error');
      btn.disabled = false;
    }
  } catch (err) {
    setStatus('Delete failed: ' + err.message, 'error');
    btn.disabled = false;
  }
}

/* ══════════════════════════════════════════════════════════════════
   SUMMARIZE
══════════════════════════════════════════════════════════════════ */
async function doSummarize() {
  const query = document.getElementById('sum-text').value.trim();
  if (!query) { setStatus('Enter text to summarise.', 'error'); return; }

  const ctx = document.getElementById('sum-ctx').value;
  const btn = document.getElementById('sum-btn');
  btn.disabled = true;
  setStatus('Summarising…', 'busy');

  try {
    const resp = await fetch(`${BASE}/api/v1/ai/summarize`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, context: ctx }),
    });
    const d = await resp.json();

    const summary = d.data?.answer || d.data?.summary || JSON.stringify(d.data);
    appendOutput('sum-output', card(
      `POST /summarize  [${ctx}]`,
      resp.ok ? 'OK' : 'ERROR',
      resp.ok ? 'badge-ok' : 'badge-error',
      `<p style="line-height:1.6;font-size:14px;color:#ccc">${escHtml(summary)}</p>
       <details style="margin-top:10px"><summary style="font-size:11px;color:#555;cursor:pointer">raw JSON</summary>
       ${jsonBlock(d)}</details>`
    ));
    setStatus('Done.', 'ok');
  } catch (err) {
    appendOutput('sum-output', card('Network Error','ERROR','badge-error',
      `<span class="json-block">${escHtml(err.message)}</span>`));
    setStatus('Network error', 'error');
  } finally { btn.disabled = false; }
}

/* ══════════════════════════════════════════════════════════════════
   SYSTEM ENDPOINTS
══════════════════════════════════════════════════════════════════ */
async function sysGet(url, label) {
  setStatus(`GET ${url}…`, 'busy');
  try {
    const resp = await fetch(BASE + url);
    const d = await resp.json();
    appendOutput('sys-output', card(
      `GET ${url}`,
      resp.ok ? 'OK' : 'ERROR',
      resp.ok ? 'badge-ok' : 'badge-error',
      jsonBlock(d)
    ));
    setStatus('Done.', 'ok');
  } catch (err) {
    appendOutput('sys-output', card(label, 'ERROR', 'badge-error',
      `<span class="json-block">${escHtml(err.message)}</span>`));
    setStatus('Network error', 'error');
  }
}
